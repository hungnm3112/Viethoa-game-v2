<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State of Decay - Translation Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>SoD Translation Hub</h1>
            </div>
            <div class="user-profile">
                <span>Phase 0.7</span>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card glass-card">
                <h3>Total Translations</h3>
                <p id="stat-total">0</p>
            </div>
            <div class="stat-card glass-card stat-python">
                <h3>BTXT (Python)</h3>
                <p id="stat-btxt">0</p>
                <div class="glow-effect"></div>
            </div>
            <div class="stat-card glass-card stat-node">
                <h3>BMD (Node.js)</h3>
                <p id="stat-bmd">0</p>
                <div class="glow-effect"></div>
            </div>
            <div class="stat-card glass-card">
                <h3>Completion</h3>
                <p id="stat-progress">100%</p>
                <div class="progress-bar"><div class="progress-fill" style="width: 100%"></div></div>
            </div>
        </section>

        <section class="data-section glass-card">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search original or translated text...">
                </div>
                <div class="filter-box">
                    <select id="method-filter">
                        <option value="">All Methods</option>
                        <option value="BTXT (Python)">BTXT (Python)</option>
                        <option value="BMD (Node.js)">BMD (Node.js)</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="40%">Source Text (English)</th>
                            <th width="40%">Translated Text (Vietnamese)</th>
                            <th width="20%">Build Method</th>
                        </tr>
                    </thead>
                    <tbody id="translations-body">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="btn-prev" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="btn-next" disabled>Next</button>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
